name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'simple-front/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'simple-front/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: simple-front

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: simple-front/package-lock.json

      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: https://example.onrender.com
