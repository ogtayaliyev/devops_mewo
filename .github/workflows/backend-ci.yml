name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'simple-back/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'simple-back/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: simple-back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: simple-back/package-lock.json

      - run: npm ci
      - run: npm test
